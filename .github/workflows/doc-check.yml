name: Doc task-block sync

# Fail a PR if any doc's generated "Tasks" block is out of sync with TASKS.md (the single source).
# Mirrors the local tidyGit / releaseCheckGit gate (checkDocTasks) so it's enforced on PRs too.

on:
  pull_request:
    branches: [main]
    paths:
      - 'TASKS.md'
      - 'docs/**'
      - 'buildSrc/**'
      - '.github/workflows/doc-check.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # KorGE 6 requires the Gradle daemon on JDK 21 (rejects <21, can't parse 26).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # composeApp declares an Android target, so the project can't be configured without an SDK.
      - uses: android-actions/setup-android@v4

      # Drop the local-only org.gradle.java.home pin so Gradle uses the runner's JDK 21.
      - name: Use the runner's JDK 21 for Gradle
        run: sed -i '/^org.gradle.java.home=/d' gradle.properties

      - uses: gradle/actions/setup-gradle@v6

      - name: Check doc task blocks are in sync with TASKS.md
        run: ./gradlew checkDocTasks --no-daemon --stacktrace
