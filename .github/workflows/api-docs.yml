name: API docs

# Render the Kotlin API reference (Dokka HTML) and publish it to GitHub Pages.
# One-time setup in the repo: Settings → Pages → Build and deployment → Source = "GitHub Actions".
# Live at: https://vitriolix.github.io/Air-War-2142/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # KorGE 6 requires the Gradle daemon on JDK 21 (rejects <21, can't parse 26).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # The composeApp build declares an Android target, so the project can't even
      # be configured without an Android SDK (AGP needs ANDROID_HOME / sdk.dir).
      - uses: android-actions/setup-android@v4

      # gradle.properties pins org.gradle.java.home to a local brew path that doesn't
      # exist on the runner — drop it so Gradle uses the JDK 21 from setup-java (JAVA_HOME).
      - name: Use the runner's JDK 21 for Gradle
        run: sed -i '/^org.gradle.java.home=/d' gradle.properties

      - uses: gradle/actions/setup-gradle@v6

      - name: Render API docs (Dokka HTML → build/api)
        run: ./gradlew renderApiDocs --no-daemon --stacktrace

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/api

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
