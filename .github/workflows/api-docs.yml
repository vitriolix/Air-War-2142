name: Docs (API reference + guides)

# Render the Kotlin API reference (Dokka HTML) AND the Markdown docs site (pandoc), then publish
# both to GitHub Pages: the API reference at the root, the guides/spec at /docs/.
# One-time setup in the repo: Settings → Pages → Build and deployment → Source = "GitHub Actions".
# Live at: https://vitriolix.github.io/Air-War-2142/  (API)  ·  https://vitriolix.github.io/Air-War-2142/docs/  (guides)

on:
  push:
    branches: [main]
    # Rebuild when the API source/build changes, OR when any doc/asset that the guides site
    # renders changes. (workflow_dispatch still allows a manual rebuild anytime.)
    paths:
      - 'composeApp/src/**'
      - '**/*.gradle.kts'
      - 'gradle/libs.versions.toml'
      - '**/*.md'
      - 'design/**'
      - 'buildSrc/**'
      - '.github/workflows/api-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # KorGE 6 requires the Gradle daemon on JDK 21 (rejects <21, can't parse 26).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # The composeApp build declares an Android target, so the project can't even
      # be configured without an Android SDK (AGP needs ANDROID_HOME / sdk.dir).
      - uses: android-actions/setup-android@v4

      # gradle.properties pins org.gradle.java.home to a local brew path that doesn't
      # exist on the runner — drop it so Gradle uses the JDK 21 from setup-java (JAVA_HOME).
      - name: Use the runner's JDK 21 for Gradle
        run: sed -i '/^org.gradle.java.home=/d' gradle.properties

      - uses: gradle/actions/setup-gradle@v6

      # renderDocs shells out to pandoc; the guides site needs it.
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      # designExport refreshes design/assets/ from the committed sprite atlas so spec.html's
      # gallery resolves; renderApiDocs → build/api; renderDocs → build/docs (open() is a
      # no-op under CI — the runner sets CI=true automatically).
      - name: Render API reference + docs site
        run: ./gradlew designExport renderApiDocs renderDocs --no-daemon --stacktrace

      - name: Assemble Pages site (API at root, guides at /docs/)
        run: |
          mkdir -p public
          cp -r build/api/. public/
          mkdir -p public/docs
          cp -r build/docs/. public/docs/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
