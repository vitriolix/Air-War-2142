<!-- @dsCard group="Screens" viewport="2200x1640" name="Paused — Seed + Copy" subtitle="GameScene.kt — adds SEED line + COPY SEED (§5.3 + round3)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air War 2142 — Paused (Seed)</title>
<style>
  /* Self-hosted shipped fonts (TrueType .ttf) — see assets/fonts/ */
  @font-face { font-family:'Wallpoet'; font-weight:400; font-display:swap; src:url(../assets/fonts/Wallpoet-400.ttf) format('truetype'); }
  @font-face { font-family:'Chakra Petch'; font-weight:400; font-display:swap; src:url(../assets/fonts/ChakraPetch-400.ttf) format('truetype'); }
  @font-face { font-family:'Chakra Petch'; font-weight:500; font-display:swap; src:url(../assets/fonts/ChakraPetch-500.ttf) format('truetype'); }
  @font-face { font-family:'Chakra Petch'; font-weight:600; font-display:swap; src:url(../assets/fonts/ChakraPetch-600.ttf) format('truetype'); }
  @font-face { font-family:'Chakra Petch'; font-weight:700; font-display:swap; src:url(../assets/fonts/ChakraPetch-700.ttf) format('truetype'); }
</style>
<style>
  /* ── DESIGN TOKENS (design-tokens.json) ──────────────────────────────── */
  :root {
    --cyan:#00FFFF; --hud-cyan:#00E5FF; --gold:#FFCC00; --orange:#FF9900;
    --green:#00FF88; --red:#E53935; --white:#FFFFFF; --dark:#1E272C;
    --ocean-top:#0F2027; --ocean-mid:#203A43; --ocean-bottom:#2C5364;
    --overlay-paused:rgba(0,0,0,.7);
    --ghost-fill:rgba(255,255,255,.078);          /* RGBA(255,255,255,20) */
    --label-160:rgba(255,255,255,.627);           /* RGBA(255,255,255,160) */
    /* refine: new token seed.copiedFlash — RGBA(0,255,136,40) confirm fill */
    --seed-copied-flash:rgba(0,255,136,.157);     /* RGBA(0,255,136,40) */
    /* type scale (logical px) */
    --t-overlay-paused:56px; --t-overlay-sub:36px;
    --font-title:   'Wallpoet', 'Courier New', monospace;
    --font-content: 'Chakra Petch', 'Courier New', monospace;
    --font: var(--font-content);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; background:#0b0f12; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; font-family:var(--font); }

  /* Two-up board: default state + transient COPIED state */
  .board { display:flex; gap:80px; flex:none; transform-origin:center center; }
  .frame { display:flex; flex-direction:column; gap:18px; }
  .vlabel { font-family:'Courier New', monospace; font-size:26px; letter-spacing:2px;
    color:rgba(255,255,255,.5); text-transform:uppercase; }
  .vlabel b { color:rgba(255,255,255,.85); font-weight:700; }

  .stage {
    position:relative; width:1000px; height:1500px; flex:none; overflow:hidden;
    background:linear-gradient(to bottom, var(--ocean-top), var(--ocean-mid), var(--ocean-bottom));
  }

  /* frozen scene (sprites from assets/sprites.png) */
  .spr { position:absolute; background-image:url(../assets/sprites.png); background-repeat:no-repeat; }
  .spr-island { width:315px; height:315px; background-size:1049px 1049px; background-position:-694px -144px; }
  .spr-cloud { width:283px; height:150px; background-size:1024px 1024px; background-position:-1px -319px; opacity:.85; }
  .spr-scout { width:171px; height:114px; background-size:1024px 1024px; background-position:-275px -1px; }
  .spr-diver { width:210px; height:131px; background-size:1024px 1024px; background-position:-448px -1px; }
  .spr-escorts { width:297px; height:150px; background-size:1029px 1029px; background-position:-1px -161px; }

  /* full-canvas dim — black @ alpha 0.7 */
  .overlay { position:absolute; inset:0; background:var(--overlay-paused); }

  /* left-aligned text block (x=80) */
  .line { position:absolute; left:80px; font-weight:700; line-height:1; white-space:nowrap; }
  .head { top:580px; font-size:var(--t-overlay-paused); font-family:var(--font-title); color:var(--white); }
  .resume { top:770px; font-size:var(--t-overlay-sub); color:var(--green); }
  .settings { top:840px; font-size:var(--t-overlay-sub); color:var(--white); }
  .abandon { top:910px; font-size:var(--t-overlay-sub); color:var(--label-160); }

  /* ── round3 additions ─────────────────────────────────────────────── */
  /* refine: SEED line — Chakra 36px at (80,1010); label white-160 + value cyan */
  .seedline { top:1010px; font-size:36px; color:var(--label-160); }
  .seedline .val { color:var(--hud-cyan); }

  /* refine: new token seed.copyControl — 320×72 ghost rect, focusable.
     Positioned on the SAME line as the SEED line, to its right (x=500, vert-centered). */
  .copyctl { position:absolute; left:500px; top:992px; width:320px; height:72px;
    background:var(--ghost-fill); }
  .copyctl .clabel { position:absolute; left:20px; top:16px; font-size:36px;
    font-weight:600; line-height:1; white-space:nowrap; color:var(--white); }
  /* COPIED state: green flash fill + green label */
  .copyctl.copied { background:var(--seed-copied-flash); }
  .copyctl.copied .clabel { color:var(--green); }

  /* Gold focus caret — solid 20×52 bar, caretX = control.x − 52 (menu pattern) */
  .caret { position:absolute; width:20px; height:52px; background:var(--gold); }
</style>
</head>
<body>
  <div class="board">

    <!-- ── DEFAULT: SEED line + COPY SEED (focused) ───────────────────── -->
    <div class="frame">
      <div class="vlabel">Pause · <b>default</b></div>
      <div class="stage">
        <div class="spr spr-island" style="left:560px; top:120px; opacity:.9;"></div>
        <div class="spr spr-cloud"  style="left:120px; top:330px;"></div>
        <div class="spr spr-scout"  style="left:170px; top:330px;"></div>
        <div class="spr spr-diver"  style="left:560px; top:420px;"></div>
        <div class="spr spr-escorts" style="left:352px; top:1080px;"></div>
        <div class="overlay"></div>

        <div class="line head">MISSION PAUSED</div>
        <div class="line resume">[ P ]&nbsp;&nbsp;Resume flight</div>
        <div class="line settings">SETTINGS &amp; INPUTS</div>
        <div class="line abandon">[ Q ]&nbsp;&nbsp;Abandon mission</div>

        <!-- round3: seed line + copy control -->
        <div class="line seedline">SEED:&nbsp;<span class="val">4815162342</span></div>
        <!-- refine: COPY SEED added to pause focus order (after Resume/Settings/Abandon) -->
        <div class="copyctl"><div class="clabel">[ C ]&nbsp;&nbsp;COPY SEED</div></div>
        <!-- gold focus caret on COPY SEED — caretX = 80−52 = 28; centered on 72-tall ctl -->
        <div class="caret" style="left:448px; top:1002px;"></div>
      </div>
    </div>

    <!-- ── COPIED: transient confirm (~1.2s after activate) ───────────── -->
    <div class="frame">
      <div class="vlabel">Pause · <b>copied (≈1.2s)</b></div>
      <div class="stage">
        <div class="spr spr-island" style="left:560px; top:120px; opacity:.9;"></div>
        <div class="spr spr-cloud"  style="left:120px; top:330px;"></div>
        <div class="spr spr-scout"  style="left:170px; top:330px;"></div>
        <div class="spr spr-diver"  style="left:560px; top:420px;"></div>
        <div class="spr spr-escorts" style="left:352px; top:1080px;"></div>
        <div class="overlay"></div>

        <div class="line head">MISSION PAUSED</div>
        <div class="line resume">[ P ]&nbsp;&nbsp;Resume flight</div>
        <div class="line settings">SETTINGS &amp; INPUTS</div>
        <div class="line abandon">[ Q ]&nbsp;&nbsp;Abandon mission</div>

        <div class="line seedline">SEED:&nbsp;<span class="val">4815162342</span></div>
        <!-- refine: new token seed.copiedTimeout ≈ 1.2s — COPIED flash, then reverts -->
        <div class="copyctl copied"><div class="clabel">COPIED&nbsp;✓</div></div>
        <div class="caret" style="left:448px; top:1002px;"></div>
      </div>
    </div>

  </div>

  <script>
    (function () {
      var board = document.querySelector('.board');
      function fit() {
        var w = board.scrollWidth, h = board.scrollHeight;
        var k = Math.min(window.innerWidth / w, window.innerHeight / h);
        board.style.transform = 'scale(' + k + ')';
      }
      window.addEventListener('resize', fit);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
      fit();
    })();
  </script>
</body>
</html>
